[package]
name = "quartermaster"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "quma"
path = "src/main.rs"

[dependencies]
# CLI
clap = { version = "4", features = ["derive"] }
indicatif = "0.17"

# Serialization & config
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Database
rusqlite = { version = "0.32", features = ["bundled"] }

# HTTP client (for Forge API)
reqwest = { version = "0.12", features = ["json", "rustls-tls", "stream"], default-features = false }

# Streaming utilities (used by reqwest byte streams)
futures-util = "0.3"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Crypto & hashing
sha2 = "0.10"
rand = "0.9"

# Archive handling
zip = "2"
sevenz-rust2 = "0.12"
tempfile = "3"

# Time
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
