<div class="stat-card" style="border-left-color: {% if available %}var(--success){% else %}var(--border){% endif %}">
    <div class="stat-label">Container</div>
    {% if available %}
    <div class="stat-value text-sm">CPU {{ cpu_percent|fmt_pct }}</div>
    <div class="stat-detail">Mem {{ mem_percent|fmt_pct }}</div>
    {% else %}
    <div class="stat-value text-sm">N/A</div>
    <div class="stat-detail">not configured</div>
    {% endif %}
</div>
