{% extends "base.html" %}
{% import "partials/nav.html" as nav %}
{% block title %}Logs — Quartermaster{% endblock %}
{% block nav %}{% call nav::nav("logs", user, csrf_token, nav) %}{% endcall %}{% endblock %}
{% block content %}
<h1>Logs</h1>

<div class="log-tab-bar">
    <button class="tab-btn active" data-tab="app">Application Logs</button>
    <button class="tab-btn" data-tab="server">Server Logs</button>
</div>

<div id="tab-app" class="tab-panel">
    <div class="log-controls">
        <div class="log-controls-left">
            <button id="app-live-toggle" class="btn btn-sm btn-outline active">Live</button>
            <button id="app-refresh-btn" class="btn btn-sm btn-outline">Refresh</button>
            <button id="app-clear-btn" class="btn btn-sm btn-outline">Clear</button>
        </div>
        <div class="log-controls-right">
            <span class="log-filter-group">
                <button class="log-level-btn active" data-level="ERROR"><span class="level-label">ERROR</span> <span class="count">0</span></button>
                <button class="log-level-btn active" data-level="WARN"><span class="level-label">WARN</span> <span class="count">0</span></button>
                <button class="log-level-btn active" data-level="INFO"><span class="level-label">INFO</span> <span class="count">0</span></button>
                <button class="log-level-btn" data-level="DEBUG"><span class="level-label">DEBUG</span> <span class="count">0</span></button>
                <button class="log-level-btn" data-level="TRACE"><span class="level-label">TRACE</span> <span class="count">0</span></button>
            </span>
            <input type="text" id="app-search" class="log-search" placeholder="Search messages...">
            <input type="text" id="app-target-filter" class="log-search" placeholder="Filter by target...">
        </div>
    </div>
    <div id="app-log-wrapper" style="position:relative">
        <button id="load-older" class="btn btn-sm" style="display:none; margin-bottom: 0.5rem; width: 100%;">Load older...</button>
        <div id="app-log-container" class="log-container">
            <div class="empty-state"><p>Loading...</p></div>
        </div>
        <button id="jump-to-latest" class="btn btn-sm btn-accent" style="display:none; position: absolute; bottom: 1rem; right: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.4);">Jump to latest ↓</button>
    </div>
</div>

<div id="tab-server" class="tab-panel" style="display:none">
    <div class="log-controls">
        <div class="log-controls-left">
            <button id="server-follow-btn" class="btn btn-sm btn-outline">Follow</button>
            <button id="server-refresh-btn" class="btn btn-sm btn-outline">Refresh</button>
            <button id="server-clear-btn" class="btn btn-sm btn-outline">Clear</button>
        </div>
        <div class="log-controls-right">
            <input type="text" id="server-search" class="log-search" placeholder="Search...">
        </div>
    </div>
    <div id="server-status" style="display:none" class="text-muted text-sm"></div>
    <div id="server-log-container" class="log-container">
        <div class="empty-state"><p>Loading...</p></div>
    </div>
</div>

<script>
(function() {
    const MAX_LOG_ENTRIES = 2000;
    let serverLogsLoaded = false;

    function trimOldEntries(container, max) {
        const entries = container.querySelectorAll('.log-entry');
        let removed = 0;
        while (entries.length - removed > max) {
            entries[removed].remove();
            removed++;
        }
        return removed;
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
            btn.classList.add('active');
            document.getElementById('tab-' + btn.dataset.tab).style.display = '';
            if (btn.dataset.tab === 'server' && !serverLogsLoaded) {
                serverLogsLoaded = true;
                loadServerLogs();
            }
        });
    });

    // --- App Logs ---
    const appContainer = document.getElementById('app-log-container');
    const appLiveToggle = document.getElementById('app-live-toggle');
    const appRefreshBtn = document.getElementById('app-refresh-btn');
    const appClearBtn = document.getElementById('app-clear-btn');
    const appSearch = document.getElementById('app-search');
    const appTargetFilter = document.getElementById('app-target-filter');
    const loadOlderBtn = document.getElementById('load-older');
    const jumpToLatestBtn = document.getElementById('jump-to-latest');

    let liveMode = true;
    let appEventSource = null;
    let activeLevels = new Set(['ERROR', 'WARN', 'INFO']);
    let oldestId = null;
    let hasMore = false;
    let searchDebounce = null;

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatTimestamp(ts) {
        const date = new Date(ts);
        const h = String(date.getHours()).padStart(2, '0');
        const m = String(date.getMinutes()).padStart(2, '0');
        const s = String(date.getSeconds()).padStart(2, '0');
        const ms = String(date.getMilliseconds()).padStart(3, '0');
        return `${h}:${m}:${s}.${ms}`;
    }

    function levelClass(level) {
        const l = level.toUpperCase();
        if (l === 'ERROR') return 'log-error';
        if (l === 'WARN') return 'log-warn';
        if (l === 'DEBUG') return 'log-debug';
        if (l === 'TRACE') return 'log-trace';
        return '';
    }

    function renderAppEntry(entry) {
        const row = document.createElement('div');
        row.className = 'log-entry ' + levelClass(entry.level);
        row.dataset.level = entry.level.toUpperCase();
        row.dataset.id = entry.id;

        const summary = document.createElement('div');
        summary.className = 'log-summary';

        const timeSpan = document.createElement('span');
        timeSpan.className = 'log-ts';
        timeSpan.textContent = formatTimestamp(entry.timestamp);

        const levelSpan = document.createElement('span');
        levelSpan.className = 'log-level';
        levelSpan.textContent = entry.level.padEnd(5);

        const messageSpan = document.createElement('span');
        messageSpan.className = 'log-message';
        messageSpan.textContent = entry.message;

        summary.appendChild(timeSpan);
        summary.appendChild(document.createTextNode(' '));
        summary.appendChild(levelSpan);
        summary.appendChild(document.createTextNode(' '));
        summary.appendChild(messageSpan);

        row.appendChild(summary);

        // Expandable detail section
        if (entry.fields || entry.target) {
            summary.style.cursor = 'pointer';
            const detail = document.createElement('div');
            detail.className = 'log-detail';
            detail.style.display = 'none';

            let detailHtml = `<div class="log-target-detail">target: <span style="color: var(--text-muted);">${escapeHtml(entry.target)}</span></div>`;

            if (entry.fields) {
                try {
                    const fields = typeof entry.fields === 'string' ? JSON.parse(entry.fields) : entry.fields;
                    if (fields && Object.keys(fields).length > 0) {
                        detailHtml += '<div class="log-fields-detail">';
                        for (const [k, v] of Object.entries(fields)) {
                            detailHtml += `<div><span style="color: #61afef;">${escapeHtml(k)}</span>=<span style="color: var(--text);">${escapeHtml(String(v))}</span></div>`;
                        }
                        detailHtml += '</div>';
                    }
                } catch(e) {
                    console.error('Failed to parse fields:', e);
                }
            }

            detail.innerHTML = detailHtml;
            row.appendChild(detail);

            summary.addEventListener('click', () => {
                detail.style.display = detail.style.display === 'none' ? 'block' : 'none';
            });
        }

        // Client-side level visibility
        if (!activeLevels.has(entry.level.toUpperCase())) {
            row.style.display = 'none';
        }

        return row;
    }

    async function fetchLogs(opts = {}) {
        const params = new URLSearchParams();
        if (opts.before) params.set('before', opts.before);
        if (opts.limit) params.set('limit', opts.limit);

        const searchVal = appSearch.value.trim();
        if (searchVal) params.set('q', searchVal);

        const targetVal = appTargetFilter.value.trim();
        if (targetVal) params.set('target', targetVal);

        const resp = await fetch(`/quma/api/logs/app?${params}`);
        const data = await resp.json();
        return data; // { entries: [...], has_more: bool }
    }

    async function fetchCounts() {
        try {
            const resp = await fetch('/quma/api/logs/app/count');
            const counts = await resp.json();

            document.querySelectorAll('.log-level-btn').forEach(btn => {
                const level = btn.dataset.level;
                const countSpan = btn.querySelector('.count');
                if (countSpan && counts[level] !== undefined) {
                    countSpan.textContent = counts[level];
                }
            });
        } catch (e) {
            console.error('Failed to fetch counts:', e);
        }
    }

    async function loadInitialLogs() {
        try {
            const data = await fetchLogs({ limit: 100 });
            appContainer.innerHTML = '';

            if (data.entries.length === 0) {
                appContainer.innerHTML = '<div class="empty-state"><p>No log entries</p></div>';
                oldestId = null;
                hasMore = false;
            } else {
                data.entries.reverse();
                data.entries.forEach(entry => {
                    appContainer.appendChild(renderAppEntry(entry));
                });
                oldestId = data.entries[0].id;
                hasMore = data.has_more;
            }

            loadOlderBtn.style.display = hasMore ? 'block' : 'none';
            appContainer.scrollTop = appContainer.scrollHeight;
        } catch (e) {
            console.error('Failed to load logs:', e);
            appContainer.innerHTML = '<div class="empty-state"><p>Error loading logs</p></div>';
        }
    }

    async function loadOlderLogs() {
        if (!oldestId || !hasMore) return;

        try {
            const data = await fetchLogs({ before: oldestId, limit: 50 });

            if (data.entries.length > 0) {
                data.entries.reverse();
                const firstEntry = appContainer.querySelector('.log-entry');
                data.entries.forEach(entry => {
                    const row = renderAppEntry(entry);
                    if (firstEntry) {
                        appContainer.insertBefore(row, firstEntry);
                    } else {
                        appContainer.appendChild(row);
                    }
                });

                oldestId = data.entries[0].id;
                hasMore = data.has_more;
                loadOlderBtn.style.display = hasMore ? 'block' : 'none';
            } else {
                hasMore = false;
                loadOlderBtn.style.display = 'none';
            }
        } catch (e) {
            console.error('Failed to load older logs:', e);
        }
    }

    function applyLevelFilters() {
        appContainer.querySelectorAll('.log-entry').forEach(el => {
            const level = el.dataset.level;
            const visible = activeLevels.has(level);
            el.style.display = visible ? '' : 'none';
        });
    }

    function isScrolledToBottom() {
        const threshold = 100;
        return appContainer.scrollHeight - appContainer.scrollTop - appContainer.clientHeight < threshold;
    }

    function updateScrollIndicators() {
        if (isScrolledToBottom()) {
            jumpToLatestBtn.style.display = 'none';
        } else {
            jumpToLatestBtn.style.display = 'block';
        }
    }

    let appSSEBuffer = [];
    let appRAFPending = false;

    function flushAppSSEBuffer() {
        appRAFPending = false;
        if (appSSEBuffer.length === 0) return;
        const entries = appSSEBuffer.splice(0, appSSEBuffer.length);
        const atBottom = isScrolledToBottom();
        const frag = document.createDocumentFragment();
        for (const entry of entries) {
            frag.appendChild(renderAppEntry(entry));
        }
        appContainer.appendChild(frag);
        trimOldEntries(appContainer, MAX_LOG_ENTRIES);
        if (atBottom) {
            appContainer.lastElementChild.scrollIntoView({ block: 'end' });
        }
        updateScrollIndicators();
    }

    function connectSSE() {
        if (appEventSource) appEventSource.close();
        appSSEBuffer.length = 0;
        appEventSource = new EventSource('/quma/api/logs/app/stream');
        appEventSource.onmessage = (event) => {
            if (!liveMode) return;
            if (appSSEBuffer.length >= 200) return;
            try {
                appSSEBuffer.push(JSON.parse(event.data));
                if (!appRAFPending) {
                    appRAFPending = true;
                    requestAnimationFrame(flushAppSSEBuffer);
                }
            } catch(e) {
                console.error('SSE parse error:', e);
            }
        };
        appEventSource.onerror = () => {
            console.error('SSE connection error');
        };
    }

    function stopSSE() {
        if (appEventSource) {
            appEventSource.close();
            appEventSource = null;
        }
    }

    // Event listeners
    appLiveToggle.addEventListener('click', () => {
        liveMode = !liveMode;
        if (liveMode) {
            appLiveToggle.classList.add('active');
            connectSSE();
        } else {
            appLiveToggle.classList.remove('active');
            stopSSE();
        }
    });

    appRefreshBtn.addEventListener('click', () => {
        loadInitialLogs();
        fetchCounts();
    });

    appClearBtn.addEventListener('click', () => {
        appContainer.innerHTML = '';
        appSSEBuffer.length = 0;
        oldestId = null;
        hasMore = false;
        loadOlderBtn.style.display = 'none';
    });

    appSearch.addEventListener('input', () => {
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => {
            loadInitialLogs();
        }, 300);
    });

    appTargetFilter.addEventListener('input', () => {
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => {
            loadInitialLogs();
        }, 300);
    });

    loadOlderBtn.addEventListener('click', loadOlderLogs);

    jumpToLatestBtn.addEventListener('click', () => {
        appContainer.scrollTop = appContainer.scrollHeight;
        updateScrollIndicators();
    });

    appContainer.addEventListener('scroll', updateScrollIndicators);

    // Level filter buttons
    document.querySelectorAll('.log-level-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const level = btn.dataset.level;
            if (activeLevels.has(level)) {
                activeLevels.delete(level);
                btn.classList.remove('active');
            } else {
                activeLevels.add(level);
                btn.classList.add('active');
            }
            applyLevelFilters();
        });
    });

    // Initialize — connect SSE only after initial load finishes
    // to prevent the SSE firehose from starving the main thread
    loadInitialLogs().then(() => { if (liveMode) connectSSE(); });
    fetchCounts();

    // --- Server Logs (unchanged) ---
    const serverContainer = document.getElementById('server-log-container');
    const serverFollowBtn = document.getElementById('server-follow-btn');
    const serverRefreshBtn = document.getElementById('server-refresh-btn');
    const serverClearBtn = document.getElementById('server-clear-btn');
    const serverSearch = document.getElementById('server-search');
    const serverStatus = document.getElementById('server-status');
    let serverFollowing = false;
    let serverEventSource = null;

    const ANSI_COLORS = [
        'inherit',  '#e06c75', '#98c379', '#e5c07b',
        '#61afef',  '#c678dd', '#56b6c2', '#abb2bf',
    ];
    const ANSI_BRIGHTS = [
        '#5c6370', '#e06c75', '#98c379', '#e5c07b',
        '#61afef', '#c678dd', '#56b6c2', '#ffffff',
    ];

    function ansiToHtml(raw) {
        let s = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        let result = '';
        let open = 0;
        const re = /\x1b\[([0-9;]*)m/g;
        let last = 0;
        let m;
        while ((m = re.exec(s)) !== null) {
            result += s.slice(last, m.index);
            last = re.lastIndex;
            const codes = m[1] ? m[1].split(';').map(Number) : [0];
            for (const c of codes) {
                if (c === 0) {
                    while (open > 0) { result += '</span>'; open--; }
                } else if (c === 1) {
                    result += '<span style="font-weight:bold">'; open++;
                } else if (c === 2) {
                    result += '<span style="opacity:.7">'; open++;
                } else if (c === 3) {
                    result += '<span style="font-style:italic">'; open++;
                } else if (c === 4) {
                    result += '<span style="text-decoration:underline">'; open++;
                } else if (c >= 30 && c <= 37) {
                    result += '<span style="color:' + ANSI_COLORS[c - 30] + '">'; open++;
                } else if (c >= 90 && c <= 97) {
                    result += '<span style="color:' + ANSI_BRIGHTS[c - 90] + '">'; open++;
                }
            }
        }
        result += s.slice(last);
        while (open > 0) { result += '</span>'; open--; }
        return result;
    }

    function renderServerLine(line) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = ansiToHtml(line);
        return div;
    }

    function applyServerFilters() {
        const search = serverSearch.value.toLowerCase();
        serverContainer.querySelectorAll('.log-entry').forEach(el => {
            el.style.display = (!search || el.textContent.toLowerCase().includes(search)) ? '' : 'none';
        });
    }

    function loadServerLogs() {
        fetch('/quma/api/logs/server?limit=100')
            .then(r => {
                if (!r.ok) throw new Error('not available');
                return r.json();
            })
            .then(lines => {
                serverContainer.innerHTML = '';
                serverStatus.style.display = 'none';
                lines.forEach(l => serverContainer.appendChild(renderServerLine(l)));
                if (lines.length === 0) {
                    serverContainer.innerHTML = '<div class="empty-state"><p>No server logs</p></div>';
                }
                serverContainer.scrollTop = serverContainer.scrollHeight;
            })
            .catch(() => {
                serverContainer.innerHTML = '';
                serverStatus.textContent = 'No server container configured or container not available.';
                serverStatus.style.display = '';
            });
    }

    let serverSSEBuffer = [];
    let serverRAFPending = false;

    function flushServerSSEBuffer() {
        serverRAFPending = false;
        if (serverSSEBuffer.length === 0) return;
        const lines = serverSSEBuffer.splice(0, serverSSEBuffer.length);
        const frag = document.createDocumentFragment();
        for (const line of lines) {
            frag.appendChild(renderServerLine(line));
        }
        serverContainer.appendChild(frag);
        trimOldEntries(serverContainer, MAX_LOG_ENTRIES);
        applyServerFilters();
        serverContainer.scrollTop = serverContainer.scrollHeight;
    }

    function startServerFollow() {
        if (serverEventSource) return;
        serverFollowing = true;
        serverFollowBtn.classList.add('active');
        serverEventSource = new EventSource('/quma/api/logs/server/stream');
        serverEventSource.onmessage = function(e) {
            if (serverSSEBuffer.length >= 200) return;
            serverSSEBuffer.push(e.data);
            if (!serverRAFPending) {
                serverRAFPending = true;
                requestAnimationFrame(flushServerSSEBuffer);
            }
        };
        serverEventSource.addEventListener('error', function(e) {
            if (e.data) {
                serverStatus.textContent = e.data;
                serverStatus.style.display = '';
            }
            stopServerFollow();
        });
    }

    function stopServerFollow() {
        if (serverEventSource) {
            serverEventSource.close();
            serverEventSource = null;
        }
        serverFollowing = false;
        serverFollowBtn.classList.remove('active');
    }

    serverFollowBtn.addEventListener('click', () => {
        if (serverFollowing) stopServerFollow();
        else startServerFollow();
    });
    serverRefreshBtn.addEventListener('click', loadServerLogs);
    serverClearBtn.addEventListener('click', () => { serverContainer.innerHTML = ''; serverSSEBuffer.length = 0; });
    serverSearch.addEventListener('input', applyServerFilters);

    // Disconnect SSE streams when the tab is hidden to prevent
    // invisible memory accumulation; reconnect when visible again.
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            stopSSE();
            if (serverFollowing) stopServerFollow();
        } else {
            if (liveMode) connectSSE();
        }
    });
})();
</script>
{% endblock %}
