<fieldset data-group-index="{{ index }}" class="card" style="position: relative; margin-bottom: 1rem">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem">
        <div style="flex: 1">
            <label class="text-sm text-muted" style="display: block; margin-bottom: 0.25rem">Group Name</label>
            <input type="text" data-field="display_name" value="{{ display_name }}"
                   placeholder="e.g. Optional Mods"
                   style="width: 100%; padding: 0.4rem 0.5rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-size: 0.9rem">
        </div>
        <div style="margin-left: 1rem; text-align: right">
            <label class="text-sm text-muted" style="display: block; margin-bottom: 0.25rem">Slug</label>
            <span data-field="slug" class="text-muted text-sm" style="font-family: monospace">{{ slug }}</span>
        </div>
        <button type="button" class="btn btn-sm btn-danger" data-remove-group
                style="margin-left: 1rem; padding: 0.15rem 0.5rem; font-size: 0.75rem"
                title="Delete group">&times;</button>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; margin-bottom: 0.75rem">
        <div>
            <label class="text-sm text-muted" style="display: block; margin-bottom: 0.25rem">Enabled</label>
            <select data-field="enabled" style="width: 100%; padding: 0.35rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text)">
                <option value=""{% if enabled_val.is_empty() %} selected{% endif %}>default</option>
                <option value="true"{% if enabled_val == "true" %} selected{% endif %}>yes</option>
                <option value="false"{% if enabled_val == "false" %} selected{% endif %}>no</option>
            </select>
        </div>
        <div>
            <label class="text-sm text-muted" style="display: block; margin-bottom: 0.25rem">Enforced</label>
            <select data-field="enforced" style="width: 100%; padding: 0.35rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text)">
                <option value=""{% if enforced_val.is_empty() %} selected{% endif %}>default</option>
                <option value="true"{% if enforced_val == "true" %} selected{% endif %}>yes</option>
                <option value="false"{% if enforced_val == "false" %} selected{% endif %}>no</option>
            </select>
        </div>
        <div>
            <label class="text-sm text-muted" style="display: block; margin-bottom: 0.25rem">Silent</label>
            <select data-field="silent" style="width: 100%; padding: 0.35rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text)">
                <option value=""{% if silent_val.is_empty() %} selected{% endif %}>default</option>
                <option value="true"{% if silent_val == "true" %} selected{% endif %}>yes</option>
                <option value="false"{% if silent_val == "false" %} selected{% endif %}>no</option>
            </select>
        </div>
        <div>
            <label class="text-sm text-muted" style="display: block; margin-bottom: 0.25rem">Restart Required</label>
            <select data-field="restart_required" style="width: 100%; padding: 0.35rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text)">
                <option value=""{% if restart_required_val.is_empty() %} selected{% endif %}>default</option>
                <option value="true"{% if restart_required_val == "true" %} selected{% endif %}>yes</option>
                <option value="false"{% if restart_required_val == "false" %} selected{% endif %}>no</option>
            </select>
        </div>
    </div>

    <div style="margin-bottom: 0.75rem">
        <label class="text-sm text-muted" style="display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer">
            <input type="checkbox" data-field="exclude_headless"{% if exclude_headless %} checked{% endif %}> Exclude from headless clients
        </label>
    </div>

    <div style="margin-bottom: 0.5rem">
        <label class="text-sm text-muted" style="display: block; margin-bottom: 0.35rem">Members</label>
        <div data-members style="display: flex; flex-wrap: wrap; gap: 0.35rem; min-height: 1.5rem">
            {% for member in members %}
            <span class="badge {% if member.installed %}badge-success{% else %}badge-warning{% endif %}"
                  data-mod-id="{{ member.forge_id }}"
                  style="display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.2rem 0.5rem; font-size: 0.8rem"
                  {% if !member.has_client_files && member.installed %}title="This mod has no client files and will be ignored by NarcoNet"{% endif %}>
                {% if member.installed %}
                    {% if member.has_client_files %}
                        {{ member.name }}
                    {% else %}
                        <span style="opacity: 0.6" title="No client files">{{ member.name }}</span>
                    {% endif %}
                {% else %}
                    Mod #{{ member.forge_id }} (not installed)
                {% endif %}
                <button type="button" data-remove-member style="background: none; border: none; color: inherit; cursor: pointer; padding: 0; font-size: 1rem; line-height: 1" title="Remove">&times;</button>
            </span>
            {% endfor %}
        </div>
    </div>

    <div>
        <select data-add-mod style="padding: 0.35rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-size: 0.85rem; min-width: 200px">
            <option value="">Add mod...</option>
            {% for m in available_mods %}
            <option value="{{ m.forge_id }}" data-mod-name="{{ m.name }}">{{ m.name }}</option>
            {% endfor %}
        </select>
    </div>
</fieldset>
