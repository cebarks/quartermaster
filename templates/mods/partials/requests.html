<div id="request-form-area" class="card">
    <h3>Request a Mod</h3>
    <div>
        <input type="text" id="mod-search-input" placeholder="Search Forge by name, paste a URL, or enter a mod ID..."
               hx-get="/quma/api/requests/search"
               hx-trigger="input changed delay:300ms"
               hx-target="#search-results"
               hx-swap="innerHTML"
               hx-indicator="#search-spinner"
               name="q"
               autocomplete="off"
               style="width:100%;margin-bottom:0.5rem">
        <span id="search-spinner" class="htmx-indicator text-muted text-sm">Searching...</span>
    </div>
    <div id="search-results"></div>
    <form id="request-create-form" style="display:none"
          hx-post="/quma/api/requests"
          hx-target="#mods-tab-content"
          hx-swap="innerHTML">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="forge_mod_id" id="selected-mod-id">
        <div id="selected-mod-preview" class="card" style="padding:0.75rem;margin:0.5rem 0"></div>
        <label for="request-reason">Why do you want this mod? (optional)</label>
        <textarea name="reason" id="request-reason" rows="2" placeholder="Tell the admins why this mod would be great..."
                  style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:0.5rem;font-size:0.9rem;resize:vertical"></textarea>
        <button type="submit" class="btn mt-1">Submit Request</button>
    </form>
</div>

<div class="request-tabs" id="request-tab-bar">
    <button class="tab active" data-tab="pending"
            hx-get="/quma/api/requests/tab?status=pending"
            hx-target="#request-table"
            hx-swap="innerHTML"
            onclick="requestTabSwitch(this)">Pending ({{ pending_requests.len() }})</button>
    <button class="tab" data-tab="approved"
            hx-get="/quma/api/requests/tab?status=approved"
            hx-target="#request-table"
            hx-swap="innerHTML"
            onclick="requestTabSwitch(this)">Approved ({{ approved_requests.len() }})</button>
    <button class="tab" data-tab="queued"
            hx-get="/quma/api/requests/tab?status=queued"
            hx-target="#request-table"
            hx-swap="innerHTML"
            onclick="requestTabSwitch(this)">Queued ({{ queued_requests.len() }})</button>
    <button class="tab" data-tab="completed"
            hx-get="/quma/api/requests/tab?status=completed"
            hx-target="#request-table"
            hx-swap="innerHTML"
            onclick="requestTabSwitch(this)">Completed ({{ completed_requests.len() }})</button>
</div>

{% if user.can("mods.install") && !approved_requests.is_empty() %}
<div id="request-install-all" style="margin:0.5rem 0;display:none">
    <form hx-post="/quma/api/requests/install-all" hx-target="#mods-tab-content" hx-swap="innerHTML" style="display:inline">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit" class="btn btn-sm btn-primary">Install all approved</button>
    </form>
</div>
{% endif %}

<table class="request-table" id="request-table">
    <thead>
        <tr>
            <th>Mod</th>
            <th>Votes</th>
            <th>Requested</th>
            <th>Fika</th>
        </tr>
    </thead>
    {% for r in &pending_requests %}
    <tbody id="request-{{ r.request.id }}">
    {% include "mods/partials/request_row.html" %}
    </tbody>
    {% endfor %}
    {% if pending_requests.is_empty() %}
    <tbody><tr><td colspan="4" class="text-muted" style="text-align:center;padding:2rem">No pending requests.</td></tr></tbody>
    {% endif %}
</table>

<script>
function requestTabSwitch(el) {
    document.querySelectorAll('#request-tab-bar .tab').forEach(function(t) { t.classList.remove('active'); });
    el.classList.add('active');
    var installAll = document.getElementById('request-install-all');
    if (installAll) {
        installAll.style.display = el.dataset.tab === 'approved' ? '' : 'none';
    }
}
var expandedRequestId = null;
function toggleRequestDetail(id) {
    var detail = document.getElementById('detail-' + id);
    var row = detail.previousElementSibling;
    var tbody = document.getElementById('request-' + id);
    if (detail.style.display === 'none') {
        document.querySelectorAll('.request-detail').forEach(function(d) {
            d.style.display = 'none';
            d.previousElementSibling.classList.remove('expanded');
            d.closest('tbody').classList.remove('request-expanded');
        });
        detail.style.display = '';
        row.classList.add('expanded');
        tbody.classList.add('request-expanded');
        expandedRequestId = id;
    } else {
        detail.style.display = 'none';
        row.classList.remove('expanded');
        tbody.classList.remove('request-expanded');
        expandedRequestId = null;
    }
}
document.addEventListener('htmx:beforeSwap', function(e) {
    if (expandedRequestId && e.detail.target.id === 'request-' + expandedRequestId) {
        e.detail.serverResponse = e.detail.serverResponse.replace(
            'id="request-' + expandedRequestId + '"',
            'id="request-' + expandedRequestId + '" class="request-expanded"'
        );
    }
});
function toggleVoteComment(btn, requestId) {
    var el = document.getElementById('vote-comment-' + requestId);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
    if (el.style.display === 'block') el.querySelector('input').focus();
}
function updateVoteComments(input, requestId) {
    var wrapper = document.getElementById('request-' + requestId);
    if (wrapper) wrapper.querySelectorAll('.vote-comment-field').forEach(function(f) { f.value = input.value; });
}
</script>
