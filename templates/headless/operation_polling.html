<div id="operation-status"
     hx-get="/quma/api/headless/operations/{{ operation_id }}/partial"
     hx-trigger="every 2s"
     hx-swap="outerHTML">
    <span class="loading-pulse" style="display: inline-block; width: 1rem; height: 1rem; border-radius: 50%; background: var(--info)"></span>
    {{ message }}
</div>
