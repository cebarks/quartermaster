<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Quartermaster{% endblock %}</title>
    <link rel="stylesheet" href="/quma/assets/style.css">
    <script src="/quma/assets/htmx.min.js"></script>
    <script src="/quma/assets/sse.js"></script>
</head>
<body>
    <nav>
        <span class="brand">Quartermaster</span>
        {% block nav %}{% endblock %}
    </nav>
    <div id="sse-source" hx-ext="sse" sse-connect="/quma/api/events">
    <main>
        {% block flash %}
        {% if let Some(flash) = flash %}
        <div class="toast toast-{{ flash.flash_type }}">{{ flash.message }}</div>
        {% endif %}
        {% endblock %}
        {% block content %}{% endblock %}
    </main>
    </div>
    <script>
    // ponytail: auto-dismiss toasts; errors get 8s, others 4s
    document.querySelectorAll('.toast').forEach(function(t) {
        var ms = t.classList.contains('toast-error') ? 8000 : 4000;
        t.style.animationDuration = '0.3s, 0.3s';
        t.style.animationDelay = '0s, ' + (ms / 1000) + 's';
        setTimeout(function() { t.remove(); }, ms + 400);
    });
    function togglePassword(id, btn) {
        var i = document.getElementById(id);
        i.type = i.type === 'password' ? 'text' : 'password';
        btn.textContent = i.type === 'password' ? 'Show' : 'Hide';
    }
    function tabSwitch(el, opts) {
        document.querySelectorAll('.tab-bar .tab').forEach(function(t) { t.classList.remove('active'); });
        el.classList.add('active');
        if (opts && opts.toggle) {
            document.querySelectorAll(opts.toggle).forEach(function(t) { t.style.display = 'none'; });
            var target = document.getElementById('tab-' + (el.dataset.tab || ''));
            if (target) target.style.display = '';
        }
        if (opts && opts.hash) {
            location.hash = el.dataset.tab;
        }
        if (opts && opts.query) {
            history.replaceState(null, '', location.pathname + '?tab=' + el.dataset.tab);
        }
    }
    function tabRestore(param) {
        var key = param === 'hash' ? location.hash.slice(1)
                : new URLSearchParams(location.search).get(param);
        if (key) {
            var btn = document.querySelector('.tab-bar .tab[data-tab="' + key + '"]');
            if (btn) btn.click();
        }
    }
    </script>
</body>
</html>
